name: Server CI/CD

on:
  push:
    paths:
      - 'server/**'
      - '.github/workflows/server.yml'
  pull_request:
    paths:
      - 'server/**'
      - '.github/workflows/server.yml'
  release:
    types: [published]

env:
  CARGO_TERM_COLOR: always
  TAG_PREFIX: server/

jobs:
  ci:
    if: github.event_name != 'release' || startsWith(github.event.release.tag_name || '', env.TAG_PREFIX)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: server

      - name: Build
        run: cargo build --release

      - name: Test
        run: cargo test

  release-linux:
    if: github.event_name == 'release' && startsWith(github.event.release.tag_name || '', env.TAG_PREFIX)
    needs: ci
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: server

      - name: Build
        run: cargo build --release

      - name: Upload Linux binary
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "${{ github.event.release.tag_name }}" \
            "target/release/whisper-server" \
            --clobber

  release-windows:
    if: github.event_name == 'release' && startsWith(github.event.release.tag_name || '', env.TAG_PREFIX)
    needs: ci
    runs-on: windows-latest
    defaults:
      run:
        working-directory: server
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: server

      - name: Build
        run: cargo build --release

      - name: Upload Windows binary
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "${{ github.event.release.tag_name }}" `
            "target\release\whisper-server.exe" `
            --clobber
